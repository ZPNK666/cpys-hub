<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BACKROOMS: LEVEL 1 - PARKING</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Инвентарь в стиле Minecraft */
        #inventory-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 500;
        }
        .inv-window {
            background: #c6c6c6; border: 4px solid #555; padding: 20px;
            box-shadow: inset -4px -4px #555, inset 4px 4px #fff;
        }
        .inv-grid { display: grid; grid-template-columns: repeat(9, 50px); gap: 4px; margin-top: 10px; }
        .armor-slots { display: flex; flex-direction: column; gap: 4px; margin-right: 20px; }
        .slot {
            width: 50px; height: 50px; background: #8b8b8b; border: 2px solid #373737;
            box-shadow: inset -2px -2px #fff, inset 2px 2px #555;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; position: relative;
        }
        .slot:hover { background: #bebebe; }
        .slot.active { border: 3px solid #ffcc00; }
        .item-count { position: absolute; bottom: 2px; right: 2px; font-size: 12px; color: #fff; text-shadow: 1px 1px #000; pointer-events: none; }

        /* HUD */
        #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; pointer-events: none; }
        #hotbar { display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px; border: 2px solid #fff; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; border: 2px solid rgba(255,255,255,0.5); z-index: 50; }
        
        #craft-panel { margin-top: 20px; border-top: 2px solid #555; padding-top: 10px; }
        .level-tag { position: absolute; top: 20px; left: 20px; color: #ffcc00; font-weight: bold; font-size: 20px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div class="level-tag" id="level-name">УРОВЕНЬ 0: ЛОББИ</div>

    <div id="hud">
        <div id="hotbar">
            <div class="slot active" data-idx="0"></div>
            <div class="slot" data-idx="1"></div>
            <div class="slot" data-idx="2"></div>
            <div class="slot" data-idx="3"></div>
            <div class="slot" data-idx="4"></div>
        </div>
    </div>

    <div id="inventory-overlay">
        <div class="inv-window">
            <h2 style="color: #000; margin-bottom: 10px;">ИНВЕНТАРЬ</h2>
            <div style="display: flex;">
                <div class="armor-slots">
                    <div class="slot" id="armor-1">🛡️</div>
                    <div class="slot" id="armor-2">🥋</div>
                </div>
                <div class="inv-grid" id="main-inv">
                    </div>
            </div>
            <div id="craft-panel">
                <p style="color: #000; font-size: 12px;">КРАФТ: [1🪵->4🟫] [4🟫->1🚪] [8🟫->1🛡️]</p>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button onclick="gameCraft('planks')">ДОСКИ</button>
                    <button onclick="gameCraft('door')">ДВЕРЬ</button>
                    <button onclick="gameCraft('armor')">БРОНЯ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let camera, scene, renderer, clock;
        let isLocked = false, currentLevel = 0;
        let inventory = Array(27).fill(null); // 27 слотов
        let hotbar = Array(5).fill(null);
        let armor = [null, null];
        let selectedSlot = 0;

        // Предметы: wood (🪵), planks (🟫), door (🚪), armor (🛡️)
        
        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            applyLevelStyle(0);
            setupInventoryUI();
            setupControls();
            
            camera.position.set(20, 15, 20);
            animate();
        }

        function applyLevelStyle(lv) {
            currentLevel = lv;
            scene.children.forEach(c => { if(c.type === "Mesh" || c.type === "PointLight") scene.remove(c); });
            
            if(lv === 0) { // Лобби (Желтое)
                scene.background = new THREE.Color(0x222200);
                scene.fog = new THREE.FogExp2(0x222200, 0.01);
                createMaze(0xc4a45e, 0x6b5a32); // Желтые обои, ковер
                document.getElementById('level-name').innerText = "УРОВЕНЬ 0: ЛОББИ";
            } else { // Парковка (Серое)
                scene.background = new THREE.Color(0x111111);
                scene.fog = new THREE.FogExp2(0x111111, 0.02);
                createMaze(0x555555, 0x333333); // Бетон, асфальт
                document.getElementById('level-name').innerText = "УРОВЕНЬ 1: ПАРКОВКА";
            }
            
            let amb = new THREE.AmbientLight(0xffffff, 0.1);
            scene.add(amb);
        }

        function createMaze(wallColor, floorColor) {
            const wallGeo = new THREE.BoxGeometry(40, 40, 40);
            const wallMat = new THREE.MeshStandardMaterial({ color: wallColor });
            for(let i=0; i<100; i++) {
                if(Math.random() > 0.8) {
                    let w = new THREE.Mesh(wallGeo, wallMat);
                    w.position.set(Math.floor(Math.random()*20)*40, 20, Math.floor(Math.random()*20)*40);
                    scene.add(w);
                }
            }
            // Пол
            let floor = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({color: floorColor}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);
        }

        function setupInventoryUI() {
            const grid = document.getElementById('main-inv');
            for(let i=0; i<27; i++) {
                let s = document.createElement('div');
                s.className = 'slot';
                s.onclick = () => console.log("Слот " + i);
                grid.appendChild(s);
            }
        }

        function gameCraft(type) {
            // Упрощенная логика проверки дерева в инвентаре
            if(type === 'planks') { addItem('🟫', 4); }
            if(type === 'door') { addItem('🚪', 1); }
            updateUI();
        }

        function addItem(icon, count) {
            // Поиск свободного слота или стака (упрощенно)
            for(let i=0; i<5; i++) { if(!hotbar[i]) { hotbar[i] = {icon, count}; break; } }
            updateUI();
        }

        function updateUI() {
            const slots = document.querySelectorAll('#hotbar .slot');
            slots.forEach((s, i) => {
                s.innerHTML = hotbar[i] ? `${hotbar[i].icon} <span class="item-count">${hotbar[i].count}</span>` : "";
            });
        }

        function setupControls() {
            document.addEventListener('mousedown', () => { if(!isLocked) document.body.requestPointerLock(); });
            document.addEventListener('pointerlockchange', () => { isLocked = document.pointerLockElement === document.body; });
            
            window.addEventListener('keydown', (e) => {
                if(e.code === 'KeyE') {
                    const inv = document.getElementById('inventory-overlay');
                    if(inv.style.display === 'flex') {
                        inv.style.display = 'none';
                        document.body.requestPointerLock();
                    } else {
                        inv.style.display = 'flex';
                        document.exitPointerLock();
                    }
                }
                if(e.code === 'Digit1') selectedSlot = 0;
                // и так далее для 1-5...
                
                // Смена уровня для теста
                if(e.code === 'KeyL') applyLevelStyle(currentLevel === 0 ? 1 : 0);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(isLocked) {
                // Движение (упрощенное)
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
