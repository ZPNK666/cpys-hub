<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.P.Y.S Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
:root{--bg:#04080f;--p:#0b1520;--b:#162030;--green:#00d26a;--blue:#5865f2;--gold:#ffd700;--cyan:#4de6e6;--red:#ff4444;--muted:#2a4055;--text:#b8d4e8;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'VT323',monospace;font-size:15px;cursor:none;}

#lampCanvas{position:fixed;inset:0;pointer-events:none;z-index:2;width:100%;height:100%;}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
#cursor{position:fixed;width:10px;height:10px;background:rgba(77,230,230,0.8);border-radius:50%;pointer-events:none;z-index:9999;transition:transform .08s cubic-bezier(0.23,1,0.32,1),width .2s,height .2s;box-shadow:0 0 10px var(--cyan);}
#cursor.click{transform:scale(1.8);background:var(--green);box-shadow:0 0 15px var(--green);}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s, transform .6s cubic-bezier(.16,1,.3,1);}
#splash.hiding{opacity:0;transform:scale(1.1);}
.splash-title{font-family:'Press Start 2P',cursive;font-size:32px;color:var(--cyan);margin-bottom:40px;text-shadow:0 0 20px var(--cyan);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.7;}}

.splash-buttons{display:flex;gap:30px;}
.splash-btn{width:140px;height:140px;background:var(--p);border:2px solid var(--muted);border-radius:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s cubic-bezier(.175,.885,.32,1.275);position:relative;overflow:hidden;}
.splash-btn:hover{border-color:var(--cyan);transform:translateY(-10px);background:var(--b);box-shadow:0 10px 30px rgba(0,0,0,0.5);}
.splash-btn .icon{font-size:40px;margin-bottom:10px;transition:.3s;}
.splash-btn .label{font-family:'Press Start 2P',cursive;font-size:10px;color:var(--text);}

/* MAIN APP */
#mainapp{display:none;height:100%;flex-direction:column;z-index:5;position:relative;}
header{height:50px;background:var(--p);border-bottom:1px solid var(--muted);display:flex;align-items:center;padding:0 20px;justify-content:space-between;}
.nav{display:flex;gap:15px;}
.nav-btn{padding:8px 15px;background:var(--b);border:1px solid var(--muted);border-radius:5px;cursor:pointer;color:var(--text);transition:.2s;display:flex;align-items:center;gap:8px;}
.nav-btn:hover{background:var(--muted);border-color:var(--cyan);}
.nav-btn.active{border-color:var(--cyan);color:var(--cyan);box-shadow:inset 0 0 10px rgba(77,230,230,0.1);}

main{flex:1;position:relative;background:rgba(0,0,0,0.3);}
section{display:none;height:100%;width:100%;}
section.active{display:block;}
iframe{width:100%;height:100%;border:none;background:#000;}

.live{font-size:12px;color:var(--green);display:flex;align-items:center;gap:5px;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>
</head>
<body>

<canvas id="lampCanvas"></canvas>
<canvas id="particles"></canvas>
<div id="cursor"></div>

<div id="splash">
    <div class="splash-title">C.P.Y.S HUB</div>
    <div class="splash-buttons">
        <div class="splash-btn" onclick="splashPick('mc')">
            <div class="icon">🧊</div>
            <div class="label">MINECRAFT</div>
        </div>
        <div class="splash-btn" onclick="splashPick('ds')">
            <div class="icon" style="filter: drop-shadow(0 0 8px var(--blue));">💬</div>
            <div class="label" style="color: var(--blue);">DISCORD</div>
        </div>
        <div class="splash-btn" id="s-game" onclick="splashPick('game')">
            <div class="icon" style="filter: drop-shadow(0 0 8px var(--red));">🚪</div>
            <div class="label" style="color: var(--red);">BACKROOMS</div>
        </div>
    </div>
</div>

<div id="mainapp">
    <header>
        <div style="font-family:'Press Start 2P'; font-size:10px; color:var(--cyan);">C.P.Y.S HUB</div>
        <div class="nav">
            <div class="nav-btn" id="bt-mc" onclick="showTab('mc')">🧊 MC</div>
            <div class="nav-btn" id="bt-ds" onclick="showTab('ds')">💬 DS</div>
            <div class="nav-btn" id="bt-game" onclick="showTab('game')">🚪 GAME</div>
        </div>
        <div class="live">● LIVE</div>
    </header>
    <main>
        <section id="mc">
            <div style="padding:40px;">
                <h2 style="color:var(--cyan); margin-bottom:20px;">MINECRAFT SERVER</h2>
                <p>Status: Under Construction</p>
            </div>
        </section>
        <section id="ds">
            <div style="padding:40px;">
                <h2 style="color:var(--blue); margin-bottom:20px;">DISCORD SERVER</h2>
                <p>Join our community!</p>
            </div>
        </section>
        <section id="game">
            <iframe src="game.html" title="Backrooms"></iframe>
        </section>
    </main>
</div>

<script>
// ТВОЙ ОРИГИНАЛЬНЫЙ КОД КУРСОРА
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cursor.classList.add('click'));
document.addEventListener('mouseup', () => cursor.classList.remove('click'));

// НАВИГАЦИЯ (ИСПРАВЛЕННАЯ)
function showTab(tabId) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    
    const targetSection = document.getElementById(tabId);
    const targetBtn = document.getElementById('bt-' + tabId);
    
    if(targetSection) targetSection.classList.add('active');
    if(targetBtn) targetBtn.classList.add('active');
}

function splashPick(tab){
    // Анимация кнопок перед скрытием
    document.querySelectorAll('.splash-btn').forEach((b,i)=>{
        setTimeout(()=>{
            b.style.transform = 'translateY(100px)';
            b.style.opacity = '0';
        }, i * 50);
    });

    setTimeout(()=>{
        const splash = document.getElementById('splash');
        splash.classList.add('hiding');
        setTimeout(()=>{
            splash.style.display = 'none';
            document.getElementById('mainapp').style.display = 'flex';
            showTab(tab);
        }, 500);
    }, 400);
}

// ТВОЙ ОРИГИНАЛЬНЫЙ ЭФФЕКТ ЛАМПЫ
const lCanvas = document.getElementById('lampCanvas');
const lCtx = lCanvas.getContext('2d');
function resize(){ lCanvas.width=window.innerWidth; lCanvas.height=window.innerHeight; }
window.onresize = resize; resize();

let mx=0, my=0;
document.addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; });

function drawLamp(){
    lCtx.clearRect(0,0,lCanvas.width,lCanvas.height);
    let grad = lCtx.createRadialGradient(mx, my, 0, mx, my, 250);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(4,8,15,0.92)');
    lCtx.fillStyle = grad;
    lCtx.fillRect(0,0,lCanvas.width,lCanvas.height);
    requestAnimationFrame(drawLamp);
}
drawLamp();

// ТВОИ ОРИГИНАЛЬНЫЕ ЧАСТИЦЫ
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let dots = [];
function pResize(){ pCanvas.width=window.innerWidth; pCanvas.height=window.innerHeight; }
window.addEventListener('resize', pResize); pResize();

class Dot {
    constructor(){
        this.x = Math.random()*pCanvas.width;
        this.y = Math.random()*pCanvas.height;
        this.v = Math.random()*0.5 + 0.2;
    }
    update(){
        this.y -= this.v;
        if(this.y < 0) this.y = pCanvas.height;
    }
    draw(){
        pCtx.fillStyle = 'rgba(77,230,230,0.3)';
        pCtx.fillRect(this.x, this.y, 1, 1);
    }
}
for(let i=0; i<80; i++) dots.push(new Dot());
function animP(){
    pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
    dots.forEach(d=>{ d.update(); d.draw(); });
    requestAnimationFrame(animP);
}
animP();
</script>
</body>
</html>
